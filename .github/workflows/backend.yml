name: Backend Tests & Build

on:
  push:
    branches: [master, develop]
    paths:
      - "services/ai/**"
      - ".github/workflows/backend.yml"
      - "package.json"
  pull_request:
    branches: [master, develop]
    paths:
      - "services/ai/**"
      - ".github/workflows/backend.yml"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e services/ai[dev]

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 services/ai/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 services/ai/app --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Type check with mypy
        run: |
          cd services/ai
          mypy app

      - name: Run unit tests
        run: |
          cd services/ai
          pytest tests/unit -v --cov=app --cov-report=xml --cov-report=html -m unit

      - name: Run integration tests
        run: |
          cd services/ai
          pytest tests/integration -v --cov=app --cov-report=xml --cov-append -m integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./services/ai/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e services/ai

      - name: Verify installation
        run: |
          cd services/ai
          python -c "import app; print('Backend build verified')"

      - name: Archive build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: services/ai/app
          retention-days: 5
