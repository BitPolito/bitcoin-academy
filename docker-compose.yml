services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bitcoin_academy
      POSTGRES_PASSWORD: bitcoin_academy
      POSTGRES_DB: bitcoin_academy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcoin_academy"]
      interval: 5s
      timeout: 5s
      retries: 5

  qvac:
    build: ./workers/qvac-service
    ports:
      - "3001:3001"
    volumes:
      - qvac_data:/app/hyperdb
      - qvac_ingest:/qvac_ingest
    environment:
      - QVAC_PORT=3001
      - QVAC_INGEST_DIR=/qvac_ingest
      # Set QVAC_LLM_SRC to a local model path to enable LLM generation.
      # Leave unset to run in embedding + retrieval only mode.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/ai
    ports:
      - "8000:8000"
    volumes:
      - ./services/ai:/app
      - qvac_ingest:/qvac_ingest
    env_file:
      - ./services/ai/.env
    environment:
      - DATABASE_URL=postgresql://bitcoin_academy:bitcoin_academy@postgres:5432/bitcoin_academy
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000
      - QVAC_SERVICE_URL=http://qvac:3001
      - QVAC_INGEST_DIR=/qvac_ingest
    depends_on:
      postgres:
        condition: service_healthy
      qvac:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./apps/web/.env.local
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  qvac_data:
  qvac_ingest:
