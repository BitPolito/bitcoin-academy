[flake8]
max-line-length = 100
exclude = .git,__pycache__,docs/source/conf.py,old/long_history.py,build,dist,venv,.venv,migrations
ignore = E203, W503

[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
asyncio_mode = auto

[coverage:run]
source = app
omit =
    */tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
